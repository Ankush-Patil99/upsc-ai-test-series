name: UPSC AI Test Series — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Lint & Test ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: upsc_user
          POSTGRES_PASSWORD: upsc_password
          POSTGRES_DB: upsc_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U upsc_user -d upsc_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx psycopg2-binary

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=upsc_password psql -h localhost -U upsc_user -d upsc_db -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run PyTest suite
        env:
          DATABASE_URL: postgresql://upsc_user:upsc_password@localhost:5432/upsc_db
          SECRET_KEY: ci-test-secret-key
        run: |
          python -m pytest tests/ -v --tb=short

  # ── Stage 2: Build & Push Docker Image ──────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/upsc-test-series:latest
            ${{ secrets.DOCKER_USERNAME }}/upsc-test-series:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
